<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>캡틴자동문</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="캡틴자동문">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb">
<style>
  html, body { height: 100%; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; text-align: center; margin-top: 60px; color: #1f2937; background: #f5f7fa; padding: 0 20px; }
  img { width: 88px; height: 88px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  h1 { font-size: 18px; margin: 0 0 24px; }
  .btn { display: inline-block; background: #2563eb; color: #fff; text-decoration: none; font-weight: 700; padding: 14px 28px; border-radius: 10px; font-size: 16px; border: none; font-family: inherit; cursor: pointer; }
  .hint { max-width: 360px; margin: 28px auto 0; text-align: left; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px 18px; font-size: 13px; color: #6b7280; line-height: 1.6; }
  .hint b { color: #1f2937; }
  #appFrame { display: none; position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  .credit { position: fixed; right: 16px; bottom: 8px; font-size: 12px; color: #9ca3af; letter-spacing: .2px; }
  .credit .sig { font-family: 'Great Vibes', cursive; font-size: 22px; color: #6b7280; margin-left: 3px; }
</style>
</head>
<body>
  <div id="landing">
    <img src="icon.png" alt="캡틴자동문">
    <h1>캡틴자동문</h1>
    <button class="btn" id="openBtn">지금 열기</button>
    <div class="hint">
      <b>홈 화면에 아이콘으로 추가하려면:</b><br>
      아이폰(Safari): 하단 공유 버튼 → "홈 화면에 추가"<br>
      안드로이드(Chrome): 우측 상단 메뉴(⋮) → "홈 화면에 추가"
      <br><br>
      한 번 추가해두면, 다음부터는 아이콘을 누르는 즉시 바로 앱으로 들어갑니다.
    </div>
    <div class="credit">by <span class="sig">Seungwoo Kim</span></div>
  </div>
  <iframe id="appFrame" title="캡틴자동문 관리자 대시보드"></iframe>
<script>
// script.google.com 주소로 최상위 이동(location.replace/직접 링크)하면 Google이 붙이는
// "Apps Script 사용자가 만들었습니다" 배너가 뜬다. 이 페이지(github.io) 안에서
// iframe으로만 열면 최상위 프레임이 계속 우리 도메인이라 배너가 표시되지 않는다.
var APP_URL = 'https://script.google.com/macros/s/AKfycby-npBgC32jFnKU74bx7gzFUBvuNctt8POBqBnWo9NsbfPuo6MjODDZ6dZvnBtwC9lf/exec';

function openApp() {
  document.getElementById('landing').style.display = 'none';
  var frame = document.getElementById('appFrame');
  frame.style.display = 'block';
  frame.src = APP_URL;
}

document.getElementById('openBtn').addEventListener('click', openApp);

var isStandalone = window.navigator.standalone === true ||
  (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
if (isStandalone) {
  openApp();
}
</script>
</body>
</html>
